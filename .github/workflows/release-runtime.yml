name: Release Runtime

on:
    workflow_run:
        workflows:
            - Release Plugin
        types:
            - completed
    workflow_dispatch:
        inputs:
            tag:
                description: 'Release tag (example: v0.1.0)'
                required: true
                type: string

permissions:
    contents: write

concurrency:
    group: release-runtime-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}
    cancel-in-progress: false

jobs:
    release-runtime:
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

            - name: Resolve release tag
              id: resolve_tag
              shell: bash
              env:
                  INPUT_TAG: ${{ inputs.tag }}
                  HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
              run: |
                  if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
                    TAG="${INPUT_TAG}"
                  else
                    git fetch --tags origin --force
                    TAG="$(git tag --points-at "${HEAD_SHA}" | grep -E '^v' | head -n 1 || true)"
                  fi

                  if [ -z "${TAG}" ]; then
                    echo "Could not resolve v* release tag for this run."
                    exit 1
                  fi

                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            - name: Ensure tag commit is on master
              shell: bash
              env:
                  RELEASE_TAG: ${{ steps.resolve_tag.outputs.tag }}
              run: |
                  git fetch origin master
                  git rev-parse "${RELEASE_TAG}^{commit}" >/dev/null
                  TAG_SHA="$(git rev-list -n 1 "${RELEASE_TAG}")"
                  if ! git merge-base --is-ancestor "${TAG_SHA}" "origin/master"; then
                    echo "Tag ${RELEASE_TAG} is not on origin/master."
                    exit 1
                  fi

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build runtime executables
              run: npm run runtime:build:exe:all

            - name: Publish runtime assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.resolve_tag.outputs.tag }}
                  fail_on_unmatched_files: true
                  files: |
                      runtime/dist/galdur-runtime-windows-x64.zip
                      runtime/dist/galdur-runtime-windows-arm64.zip
                      runtime/dist/galdur-runtime-checksums.txt
