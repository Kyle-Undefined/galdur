name: CI

on:
    push:
        branches:
            - '**'
    pull_request:
    workflow_dispatch:

jobs:
    test-windows:
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm test

    validate:
        runs-on: ubuntu-latest
        needs: test-windows
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run check

            - name: Build runtime JS
              run: npm run runtime:build:js

            - name: Build plugin
              run: npm run build
