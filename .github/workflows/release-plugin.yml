name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    test-windows:
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm test

    validate:
        runs-on: ubuntu-latest
        needs: test-windows
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Ensure tag commit is on master
              run: |
                  git fetch origin master
                  TAG_SHA="${GITHUB_SHA}"
                  if ! git merge-base --is-ancestor "${TAG_SHA}" "origin/master"; then
                    echo "Tag ${GITHUB_REF_NAME} is not on origin/master."
                    exit 1
                  fi

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run check

            - name: Build runtime JS
              run: npm run runtime:build:js

            - name: Build plugin
              run: npm run build

    release-plugin:
        runs-on: ubuntu-latest
        needs: validate
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build plugin
              run: npm run build

            - name: Verify required release files
              run: |
                  for file in main.js manifest.json versions.json; do
                    if [ ! -f "$file" ]; then
                      echo "Required file $file is missing"
                      exit 1
                    fi
                  done

            - name: Package plugin assets
              run: |
                  VERSION="${GITHUB_REF_NAME}"
                  VERSION="${VERSION#v}"
                  mkdir -p dist/release
                  cp main.js manifest.json versions.json dist/release/
                  if [ -f styles.css ]; then
                      cp styles.css dist/release/
                  fi
                  cd dist/release
                  zip -r "../galdur-${VERSION}.zip" .

            - name: Publish release assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  generate_release_notes: true
                  fail_on_unmatched_files: true
                  files: |
                      main.js
                      manifest.json
                      versions.json
                      dist/galdur-*.zip

    release-runtime:
        runs-on: windows-latest
        needs: validate
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build runtime executables
              run: npm run runtime:build:exe:all

            - name: Publish runtime assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  fail_on_unmatched_files: true
                  files: |
                      runtime/dist/galdur-runtime-windows-x64.zip
                      runtime/dist/galdur-runtime-windows-arm64.zip
                      runtime/dist/galdur-runtime-checksums.txt
