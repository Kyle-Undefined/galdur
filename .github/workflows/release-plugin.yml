name: Release Plugin

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    release-plugin:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Ensure tag commit is on master
              run: |
                  DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
                  git fetch origin "${DEFAULT_BRANCH}"
                  if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${DEFAULT_BRANCH}"; then
                    echo "Tag ${GITHUB_REF_NAME} is not on origin/${DEFAULT_BRANCH}."
                    exit 1
                  fi

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run check

            - name: Build plugin
              run: npm run build

            - name: Verify required release files
              run: |
                  for file in main.js manifest.json versions.json; do
                    if [ ! -f "$file" ]; then
                      echo "Required file $file is missing"
                      exit 1
                    fi
                  done

            - name: Package plugin assets
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  mkdir -p dist/release
                  cp main.js manifest.json versions.json dist/release/
                  if [ -f styles.css ]; then
                    cp styles.css dist/release/
                  fi
                  cd dist/release
                  zip -r "../galdur-${VERSION}.zip" .

            - name: Publish release assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  generate_release_notes: true
                  fail_on_unmatched_files: true
                  files: |
                      main.js
                      manifest.json
                      versions.json
                      dist/galdur-*.zip
