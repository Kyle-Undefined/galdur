name: Release

on:
    push:
        tags:
            - '*'

permissions:
    contents: write

jobs:
    test-windows:
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm test

    validate:
        runs-on: ubuntu-latest
        needs: test-windows
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Ensure tag commit is on master
              run: |
                  git fetch --no-tags origin +refs/heads/master:refs/remotes/origin/master
                  TAG_COMMIT="$(git rev-parse "${GITHUB_SHA}^{commit}")"
                  if ! git merge-base --is-ancestor "${TAG_COMMIT}" "origin/master"; then
                    echo "Tag ${GITHUB_REF_NAME} is not on origin/master."
                    exit 1
                  fi

            - name: Ensure tag matches manifest version
              run: |
                  TAG_NAME="${GITHUB_REF_NAME}"
                  MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"

                  if [ "${TAG_NAME}" != "${MANIFEST_VERSION}" ]; then
                    echo "Tag ${TAG_NAME} does not match manifest.json version ${MANIFEST_VERSION}."
                    exit 1
                  fi

                  if [ "${PACKAGE_VERSION}" != "${MANIFEST_VERSION}" ]; then
                    echo "package.json version ${PACKAGE_VERSION} does not match manifest.json version ${MANIFEST_VERSION}."
                    exit 1
                  fi

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run check

            - name: Build runtime JS
              run: npm run runtime:build:js

            - name: Build plugin
              run: npm run build

    release-plugin:
        runs-on: ubuntu-latest
        needs: validate
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build plugin
              run: npm run build

            - name: Verify required release files
              run: |
                  for file in main.js manifest.json versions.json styles.css; do
                    if [ ! -f "$file" ]; then
                      echo "Required file $file is missing"
                      exit 1
                    fi
                  done

            - name: Package plugin assets
              run: |
                  VERSION="${GITHUB_REF_NAME}"
                  mkdir -p dist/release
                  cp main.js manifest.json versions.json styles.css dist/release/
                  cd dist/release
                  zip -r "../galdur-${VERSION}.zip" .

            - name: Publish release assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  generate_release_notes: true
                  fail_on_unmatched_files: true
                  files: |
                      main.js
                      manifest.json
                      styles.css
                      versions.json
                      dist/galdur-*.zip

    release-runtime:
        runs-on: windows-latest
        needs: validate
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build runtime executables
              run: npm run runtime:build:exe:all

            - name: Publish runtime assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  fail_on_unmatched_files: true
                  files: |
                      runtime/dist/galdur-runtime-windows-x64.zip
                      runtime/dist/galdur-runtime-windows-arm64.zip
                      runtime/dist/galdur-runtime-checksums.txt
